<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Selenium Otomotiv</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SPLASH -->
  <div id="splash-screen" class="screen active">
    <div class="splash-content">
      <div class="logo">SELENIUM</div>
      <div class="subtitle">OTOMOTİV</div>
      <div class="loader"></div>
      <div id="splash-status">Başlatılıyor...</div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen" class="screen">
    <div class="login-container">
      <div class="login-header">
        <div class="logo small">SELENIUM</div>
        <div class="subtitle">OTOMOTİV</div>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <div class="input-group">
          <label for="username">Kullanıcı Adı</label>
          <input type="text" id="username" name="username"
            autocomplete="username" autocapitalize="none"
            spellcheck="false" required>
        </div>

        <div class="input-group">
          <label for="password">Şifre</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password"
              autocomplete="current-password" required>
            <button type="button" id="toggle-password" class="toggle-password" aria-label="Şifreyi göster">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="login-error" class="login-error" hidden></div>

        <button type="submit" id="login-button" class="primary-button">
          <span class="button-text">Giriş Yap</span>
          <span class="button-loader" hidden></span>
        </button>
      </form>

      <div class="login-footer">v0.2 — Faz 1</div>
    </div>
  </div>

  <!-- HOME (geçici) -->
  <div id="home-screen" class="screen">
    <header class="app-header">
      <div class="header-title">
        <span class="brand-mini">SELENIUM</span>
      </div>
      <button id="logout-button" class="icon-button" aria-label="Çıkış yap">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <main class="home-content">
      <div class="welcome-box">
        <div class="welcome-label">Hoşgeldin,</div>
        <div class="welcome-name" id="welcome-name">—</div>
      </div>

      <div class="info-card">
        <div class="info-card-title">Faz 1 Tamamlandı ✓</div>
        <div class="info-card-text">
          Giriş sistemi çalışıyor. Faz 2'de alt menü çubuğu ve sayfa iskeletleri gelecek.
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
