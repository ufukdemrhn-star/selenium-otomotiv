<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Selenium Otomotiv</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="splash-screen">
    <div class="splash-content">
      <div class="logo">SELENIUM</div>
      <div class="subtitle">OTOMOTİV</div>
      <div class="loader"></div>
      <div id="status-text">Yükleniyor...</div>
      <div id="connection-status">
        <span class="status-dot pending"></span>
        <span class="status-label">Firebase bağlantısı bekleniyor</span>
      </div>
      <div class="version">v0.1 — Faz 0</div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
